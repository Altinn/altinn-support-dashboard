name: Frontend CI checks
permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Frontend Full TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend/altinn-support-dashboard.client

      - name: TypeScript type check
        run: npm run typecheck
        working-directory: ./frontend/altinn-support-dashboard.client
        # package.json: "typecheck": "tsc --noEmit"

      - name: ESLint check
        run: npm run lint
        working-directory: ./frontend/altinn-support-dashboard.client
        # package.json: "lint": "eslint . --ext .ts,.tsx"


        #Tests and coverage report
      - name: Run tests with coverage
        working-directory: ./frontend/altinn-support-dashboard.client
        run: npm test -- --coverage

      - name: Generate Coverage Summary
        uses: irongut/CodeCoverageSummary@f13848964841ca2f7a63343b287493e17dc645de
        with:
          format: markdown
          filename: "frontend/altinn-support-dashboard.client/.coverage/cobertura-coverage.xml"
          output: "both"
          fail_below_min: false
          badge: true

      - name: Post PR Comment
        uses: marocchino/sticky-pull-request-comment@5060d4700a91de252c87eeddd2da026382d9298a
        with:
          header: "Frontend Code Coverage"
          recreate: true
          path: "code-coverage-results.md"

  playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for e2e changes
        id: e2e-changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            e2e:
              - 'frontend/altinn-support-dashboard.client/e2e/**'
              - 'frontend/altinn-support-dashboard.client/playwright.config.ts'
      - name: Setup Node.js
        if: steps.e2e-changes.outputs.e2e == 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'
      
      - name: Install dependencies
        if: steps.e2e-changes.outputs.e2e == 'true'
        run: npm ci
        working-directory: ./frontend/altinn-support-dashboard.client

      - name: Setup .NET
        if: steps.e2e-changes.outputs.e2e == 'true'
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v5
        with:
          dotnet-version: '10.x'

      - name: Start backend
        if: steps.e2e-changes.outputs.e2e == 'true'
        working-directory: ./backend/src/altinn-support-dashboard.backend
        run: dotnet run  --launch-profile http &
        env:
          Configuration__TT02__MaskinportenSettings__ClientId: ${{ secrets.CONFIGURATION__TT02__MASKINPORTENSETTINGS__CLIENTID }}
          Configuration__TT02__MaskinportenSettings__Scope: ${{ secrets.CONFIGURATION__TT02__MASKINPORTENSETTINGS__SCOPE }}
          Configuration__TT02__MaskinportenSettings__EncodedJwk: ${{ secrets.CONFIGURATION__TT02__MASKINPORTENSETTINGS__ENCODEDJWK }}
          Configuration__TT02__MaskinportenSettings__Environment: test
          Configuration__TT02__ApiKey: ${{ secrets.CONFIGURATION__TT02__APIKEY }}
          Configuration__TT02__Ocp_Apim_Subscription_Key: ${{ secrets.CONFIGURATION__TT02__OCP_APIM_SUBSCRIPTION_KEY }}

          #Same values for PROD, just so startup don't crash
          Configuration__Production__MaskinportenSettings__ClientId: ${{ secrets.CONFIGURATION__TT02__MASKINPORTENSETTINGS__CLIENTID}}
          Configuration__Production__MaskinportenSettings__Scope: ${{ secrets.CONFIGURATION__TT02__MASKINPORTENSETTINGS__SCOPE}}
          Configuration__Production__MaskinportenSettings__EncodedJwk: ${{ secrets.CONFIGURATION__TT02__MASKINPORTENSETTINGS__ENCODEDJWK }}
          Configuration__Production__MaskinportenSettings__Environment: test
          Configuration__Production__ApiKey: ${{ secrets.CONFIGURATION__TT02__APIKEY }}
          Configuration__Production__Ocp_Apim_Subscription_Key: ${{ secrets.CONFIGURATION__TT02__OCP_APIM_SUBSCRIPTION_KEY}}
          FeatureManagement__Ansattporten: "false"

      - name: Wait for backend to be ready
        if: steps.e2e-changes.outputs.e2e == 'true'
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:5237/swagger/index.html > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done
        
      - name: Install Playwright Browsers
        if: steps.e2e-changes.outputs.e2e == 'true'
        run: npx playwright install --with-deps
        working-directory: ./frontend/altinn-support-dashboard.client
      
      - name: Run Playwright tests
        if: steps.e2e-changes.outputs.e2e == 'true'
        run: npx playwright test
        working-directory: ./frontend/altinn-support-dashboard.client

      - uses: actions/upload-artifact@v4
        if: steps.e2e-changes.outputs.e2e == 'true'
        with:
          name: playwright-report
          path: ./frontend/altinn-support-dashboard.client/playwright-report/
          retention-days: 5
