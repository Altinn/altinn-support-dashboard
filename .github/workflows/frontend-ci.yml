name: Frontend CI checks
permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Frontend Full TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend/altinn-support-dashboard.client

      - name: TypeScript type check
        run: npm run typecheck
        working-directory: ./frontend/altinn-support-dashboard.client
        # package.json: "typecheck": "tsc --noEmit"

      - name: ESLint check
        run: npm run lint
        working-directory: ./frontend/altinn-support-dashboard.client
        # package.json: "lint": "eslint . --ext .ts,.tsx"


        #Tests and coverage report
      - name: Run tests with coverage
        working-directory: ./frontend/altinn-support-dashboard.client
        run: npm test -- --coverage

      - name: Generate Coverage Summary
        uses: irongut/CodeCoverageSummary@f13848964841ca2f7a63343b287493e17dc645de
        with:
          format: markdown
          filename: "frontend/altinn-support-dashboard.client/.coverage/cobertura-coverage.xml"
          output: "both"
          fail_below_min: false
          badge: true

      - name: Post PR Comment
        uses: marocchino/sticky-pull-request-comment@5060d4700a91de252c87eeddd2da026382d9298a
        with:
          header: "Frontend Code Coverage"
          recreate: true
          path: "code-coverage-results.md"

      - name: Start backend
        working-directory: ./backend/src/altinn-support-dashboard.backend
        run: dotnet run &
        env:
          Environments__TT02__MaskinportenSettings__ClientId: ${{ secrets.TT02_MASKINPORTEN_CLIENT_ID }}
          Environments__TT02__MaskinportenSettings__Scope: ${{ secrets.TT02_MASKINPORTEN_SCOPE }}
          Environments__TT02__MaskinportenSettings__EncodedJwk: ${{ secrets.TT02_MASKINPORTEN_ENCODED_JWK }}
          Environments__TT02__MaskinportenSettings__Environment: test
          Environments__TT02__ApiKey: ${{ secrets.TT02_API_KEY }}
          Environments__TT02__Ocp_Apim_Subscription_Key: ${{ secrets.TT02_OCP_APIM_KEY }}
          FeatureManagement__Ansattporten: "false"

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5237 | grep -qE "200|404"; then
              echo "Backend is ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done
      
      - name: Check e2e changes
        id: check_e2e
        run: |
          if git diff --name-only origin/main...HEAD | grep -qE 'frontend/altinn-support-dashboard.client/e2e/|playwright.config'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        
      - name: Install Playwright Browsers
        if: steps.check_e2e.outputs.changed == 'true'
        run: npx playwright install --with-deps
        working-directory: ./frontend/altinn-support-dashboard.client
      
      - name: Run Playwright tests
        if: steps.check_e2e.outputs.changed == 'true'
        run: npx playwright test
        working-directory: ./frontend/altinn-support-dashboard.client

      - uses: actions/upload-artifact@v4
        if: steps.check_e2e.outputs.changed == 'true'
        with:
          name: playwright-report
          path: ./frontend/altinn-support-dashboard.client/playwright-report/
          retention-days: 5
